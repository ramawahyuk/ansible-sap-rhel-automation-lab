# ======================================================
# Ansible Configuration - SAP Automation Project
# Location : ~/sap-ansible/ansible.cfg
# Node     : ansnode (192.168.1.18)
# ======================================================

[defaults]
# -- Vault configuration ------------------------------------
# Automatically use this file for vault decryption
# NEVER commit .vault_pass to version control
# In production: use HashiCorp Vault, CyberArk, or AAP credentials
vault_password_file = /root/sap-ansible/.vault_pass

# -- Inventory ----------------------------------------------
# Default inventory file - no need to pass -i on every command
inventory = inventory/hosts.yml

# -- Roles path ---------------------------------------------
# Ansible looks here for custom roles before system paths
roles_path = roles

# -- Collections path ---------------------------------------
# Ansible looks here for installed collections first
collections_path = collections

# -- Remote user --------------------------------------------
# Default SSH user for all managed nodes
remote_user = root

# -- SSH settings -------------------------------------------
# Disable host key checking for lab environment
# WARNING: Set to True in production
host_key_checking = False

# -- Performance --------------------------------------------
# Number of hosts processed in parallel
# Keep at 5 for lab; increase to 20-50 in production
forks = 5

# -- Logging ------------------------------------------------
# Log all playbook runs - essential for SAP troubleshooting
log_path = /root/sap-ansible/ansible.log

# -- Output format ------------------------------------------
# Show task execution time - important for SAP install timing
callbacks_enabled = timer, profile_tasks

# -- Fact caching -------------------------------------------
# Cache gathered facts to speed up repeated runs
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

# -- Retry files --------------------------------------------
# Do not create .retry files (clutters project directory)
retry_files_enabled = False

# -- Fact variable injection --------------------------------
# In ansible-core 2.24, top-level ansible_* fact injection will
# be removed. Setting this now makes behavior explicit and
# future-proof. We keep inject_facts_as_vars=True for now because
# community.sap_install roles still use ansible_* style internally.
# Review when upgrading past ansible-core 2.24.
inject_facts_as_vars = True

[privilege_escalation]
# -- Sudo settings ------------------------------------------
# We run as root directly so escalation is not needed now
# In production: become=True, become_method=sudo
become = False
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# -- SSH optimizations ----------------------------------------
# Reuse SSH connections - dramatically speeds up large playbooks
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o StrictHostKeyChecking=no

# -- Pipelining ---------------------------------------------
# Send multiple commands without creating temporary files
# Significant performance improvement for SAP installations
pipelining = True
