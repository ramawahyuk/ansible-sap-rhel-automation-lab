---
# ================================================================
# Oracle DB 19c for SAP - Role Variables
# Role: community.sap_install.sap_anydb_install_oracle
# ================================================================

# -- Role-specific variable names (must match exactly) ----------
# Oracle SID - must match SAP SID
sap_anydb_install_oracle_sid: "ERP"

# Oracle base - matches existing /oracle mount
sap_anydb_install_oracle_base: "/oracle"

# Oracle data files location - subdirectory under /oracle
sap_anydb_install_oracle_filesystem_storage: "/oracle/oradata"

# Oracle central inventory location
sap_anydb_install_oracle_inventory_central: "/oracle/oraInventory"

# Install method - minimal (no response file needed)
sap_anydb_install_oracle_method: "minimal"

# Oracle software extraction path
# SAP media must be staged here before running the role
sap_anydb_install_oracle_extract_path: "/oracle/software"

# Patching - disabled until media is staged
sap_anydb_install_oracle_patch_enable: false

# System password - references vault
sap_anydb_install_oracle_system_password: "{{ vault_oracle_system_password }}"

# -- Generic reference variables (used by other roles/playbooks) -
oracle_base: "/oracle"
oracle_sid: "ERP"
oracle_version: "19.3"
