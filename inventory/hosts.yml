---
# ================================================================
# SAP Ansible Inventory
# ================================================================
# Architecture : SAP S/4HANA (HANA DB + ABAP on one host)
# Controller   : ansnode  | 192.168.1.18 | RHEL 8.10
# SAP Server   : saperp   | 192.168.1.17 | RHEL 8.10
# SAP DB       : HANA
# ================================================================

all:

  # ── Variables applied to EVERY host in inventory ─────────────
  vars:
    # Ansible connection defaults
    ansible_user: root
    ansible_python_interpreter: /usr/libexec/platform-python

  children:

    # ── Top-level SAP group ───────────────────────────────────
    sap_servers:
      children:

        # ── Database tier ─────────────────────────────────────
        # SAP HANA DB
        sap_db:
          hosts:
            saperp:

        # ── Application tier ──────────────────────────────────
        # SAP ABAP stack via SWPM
        sap_app:
          hosts:
            saperp:

      # ── Host definitions ──────────────────────────────────
      # saperp appears in both sap_db and sap_app (Standard System)
      # Ansible deduplicates — tasks run ONCE per host per play

    # ── Controller node (for local tasks if needed) ──────────
    # ansnode is NOT managed by Ansible — it IS Ansible
    # Defined here only for documentation purposes
    # ansible_connection: local means no SSH needed
    controller:
      hosts:
        ansnode:
          ansible_host: 192.168.1.18
          ansible_connection: local
          ansible_pyhton_interpreter: /usr/bin/python3.12

# ── Host-level connection details ───────────────────────────────
# These override group-level vars for specific hosts

# saperp host variables live in:
# inventory/group_vars/sap_servers/  → applies to all sap_servers
# inventory/host_vars/saperp/        → applies to saperp only (future)
