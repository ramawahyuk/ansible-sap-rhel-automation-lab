---
# swpm_install.yml
# Drop into playbooks/ — run this AFTER hana_install.yml completes
#
# Run order for the pivoted lab:
#   1. sap_preconfiguration.yml            (unchanged)
#   2. sap_netweaver_preconfiguration.yml  (unchanged)
#   3. hana_install.yml                    (DONE - S4D/00 running GREEN)
#   4. swpm_install.yml                    (THIS - installs ASCS + PAS via SWPM)

- name: Install SAP S/4HANA application layer via SWPM
  hosts: saperp
  become: true
  roles:
    - role: community.sap_install.sap_install_media_detect
      vars:
        sap_install_media_detect_source_directory: /sapmedia
        sap_install_media_detect_db_client: 'saphana'
        sap_install_media_detect_swpm: false
        sap_install_media_detect_hostagent: true
        sap_install_media_detect_igs: true
        sap_install_media_detect_kernel: true
        sap_install_media_detect_kernel_db: 'saphana'
        sap_install_media_detect_webdisp: false
      tags: [swpm_media_detect, always]

    - role: community.sap_install.sap_swpm
      tags: [swpm_install]

  post_tasks:
    - name: Verify S/4HANA OneHost instance is running
      ansible.builtin.command: >
        /usr/sap/hostctrl/exe/sapcontrol -nr {{ sap_swpm_pas_instance_nr }}
        -function GetProcessList
      register: s4_status
      changed_when: false
      failed_when: "'GREEN' not in s4_status.stdout"

    - name: Show S/4HANA instance status
      ansible.builtin.debug:
        var: s4_status.stdout_lines
